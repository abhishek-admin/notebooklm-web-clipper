<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NotebookLM Clipper</title>
  <link rel="stylesheet" href="popup.css">
  <style>
    :root { --accent: #8b5cf6; }

    /* Page card — always visible */
    .page-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .page-card-domain {
      font-size: 10px;
      color: var(--accent);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 3px;
      opacity: 0.85;
    }
    .page-card-title {
      font-size: 12px;
      color: var(--text-1);
      font-weight: 500;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Hook text */
    .hook-text {
      font-size: 12.5px;
      line-height: 1.65;
      color: var(--text-1);
      margin: 0 0 10px 0;
    }

    /* Topic chips */
    .topics-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 14px;
    }
    .topic-chip {
      font-size: 10px;
      padding: 3px 9px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      border-radius: 20px;
      color: var(--accent);
      font-weight: 600;
    }

    /* NLM action buttons */
    .nlm-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .nlm-actions .primary-btn {
      flex: 1;
      font-size: 12px;
      padding: 10px 12px;
    }
    .podcast-btn {
      flex: 1;
      padding: 10px 12px;
      background: transparent;
      border: 1px solid var(--border-mid);
      border-radius: 10px;
      color: var(--text-2);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      overflow: hidden;
    }
    .podcast-btn:hover {
      background: var(--surface2);
      color: var(--text-1);
      border-color: var(--border-mid);
      transform: translateY(-1px);
    }

    /* Status bar (after clicking Add to NLM) */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(139,92,246,0.08);
      border: 1px solid var(--accent-border);
      border-radius: 8px;
      font-size: 11px;
      color: var(--accent);
      font-weight: 600;
      margin-top: 8px;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }
    .status-bar.hidden { display: none; }

    @media (prefers-color-scheme: light) {
      .podcast-btn { border-color: rgba(0,0,0,0.12); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <span class="logo">✦</span>
        <h1>NotebookLM Clipper</h1>
      </div>
      <div class="header-right">
        <span class="badge">Gemini</span>
        <button id="settings-btn" class="settings-btn" title="API Settings">⚙</button>
      </div>
    </div>

    <!-- Always visible page card -->
    <div class="page-card">
      <div class="page-card-domain" id="page-domain">Loading...</div>
      <div class="page-card-title" id="page-title">Detecting current tab...</div>
    </div>

    <div id="onboarding" class="hidden">
      <p class="onboarding-title">👋 Welcome! Add your API key</p>
      <p class="onboarding-desc">Enter a <strong>Gemini</strong> or <strong>OpenRouter</strong> key — just one is enough to get started.</p>
      <div class="onboard-field">
        <label class="settings-label">Gemini API Key <span class="settings-hint">— <a href="https://aistudio.google.com/app/apikey" target="_blank">Get free key ↗</a></span></label>
        <div class="settings-row">
          <input type="password" id="onboard-gemini-input" class="settings-input" placeholder="AIza..." />
          <button id="onboard-toggle-gemini" class="toggle-vis-btn">👁</button>
        </div>
      </div>
      <div class="onboard-field">
        <label class="settings-label">OpenRouter API Key <span class="settings-hint">— <a href="https://openrouter.ai/keys" target="_blank">Get key ↗</a></span></label>
        <div class="settings-row">
          <input type="password" id="onboard-openrouter-input" class="settings-input" placeholder="sk-or-..." />
          <button id="onboard-toggle-openrouter" class="toggle-vis-btn">👁</button>
        </div>
      </div>
      <button id="onboard-save-btn" class="primary-btn">Get Started →</button>
    </div>

    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <p class="loading-text">Analyzing with Gemini...</p>
    </div>

    <div id="result" class="hidden">
      <p class="hook-text" id="hook-text"></p>
      <div class="topics-row" id="topics-row"></div>
      <div class="nlm-actions">
        <button id="add-nlm-btn" class="primary-btn">+ Add to NotebookLM</button>
        <button id="podcast-btn" class="podcast-btn">🎙 Podcast</button>
      </div>
      <div id="status-bar" class="status-bar hidden">
        <div class="status-dot"></div>
        <span id="status-text">Opening NotebookLM...</span>
      </div>
      <button id="rerun-btn" class="rerun-btn">↻ Re-analyze</button>
    </div>

    <div id="error" class="hidden">
      <p class="error-text" id="error-message">Something went wrong.</p>
      <button id="retry-btn" class="secondary-btn">Retry</button>
    </div>

    <div id="settings-panel" class="hidden">
      <div class="settings-header">
        <span>API Settings</span>
        <button id="settings-close" class="settings-close">✕</button>
      </div>
      <div class="settings-body">
        <label class="settings-label">Gemini API Key</label>
        <div class="settings-row">
          <input type="password" id="gemini-key-input" class="settings-input" placeholder="Paste Gemini key..." />
          <button id="toggle-gemini-key" class="toggle-vis-btn">👁</button>
        </div>
        <label class="settings-label">OpenRouter API Key <span class="settings-hint">(fallback)</span></label>
        <div class="settings-row">
          <input type="password" id="openrouter-key-input" class="settings-input" placeholder="Paste OpenRouter key..." />
          <button id="toggle-openrouter-key" class="toggle-vis-btn">👁</button>
        </div>
        <div class="settings-actions">
          <button id="save-keys-btn" class="primary-btn" style="padding:8px 12px;font-size:12px;">Save Keys</button>
          <button id="clear-keys-btn" class="secondary-btn">Clear All Keys</button>
        </div>
      </div>
    </div>

    <div class="footer">
      <span>Built by <a href="https://x.com/happy_ships" target="_blank">@happy_ships</a></span>
      <span>Day 11/180</span>
    </div>
  </div>

  <script src="gemini.js"></script>
  <script src="popup.js"></script>
</body>
</html>
